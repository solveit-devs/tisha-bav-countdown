<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#04060d"/>
    </linearGradient>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f3d7a1"/>
      <stop offset="100%" stop-color="#c8912f"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="58%" r="46%">
      <stop offset="0%" stop-color="#e0ae56" stop-opacity=".38"/>
      <stop offset="100%" stop-color="#e0ae56" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>
  <circle cx="256" cy="292" r="190" fill="url(#glow)"/>

  <g fill="url(#g)">
    <!-- roof spikes -->
    <path d="M172,150 l8,-16 l8,16 Z M204,150 l8,-16 l8,16 Z M236,150 l8,-16 l8,16 Z
             M268,150 l8,-16 l8,16 Z M300,150 l8,-16 l8,16 Z M332,150 l8,-16 l8,16 Z"/>
    <!-- cornice -->
    <rect x="164" y="152" width="184" height="18"/>
    <!-- porch -->
    <rect x="178" y="170" width="156" height="192"/>
    <!-- side chambers -->
    <rect x="112" y="248" width="62" height="114"/>
    <rect x="338" y="248" width="62" height="114"/>
    <!-- platform and steps -->
    <rect x="96" y="362" width="320" height="20"/>
    <rect x="120" y="386" width="272" height="16"/>
    <rect x="144" y="406" width="224" height="16"/>
  </g>

  <!-- the doorway, left open -->
  <rect x="228" y="212" width="56" height="150" fill="#0b1020"/>
  <rect x="134" y="284" width="16" height="42" fill="#0b1020"/>
  <rect x="362" y="284" width="16" height="42" fill="#0b1020"/>
</svg>
